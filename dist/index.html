    <!-- 載入 EasyPlayer Pro -->
    <script src="/js/EasyPlayer-pro.js" onload="console.log('✅ EasyPlayer Pro JS 已載入')" onerror="console.error('❌ EasyPlayer Pro 載入失敗')"></script>
    
    <!-- 初始化播放器檢測腳本 -->
    <script>
      // 延遲執行檢測，確保所有腳本都已載入
      setTimeout(() => {
        // 全域播放器檢測
        window.playerCapabilities = {
          libvlc: false,
          easyplayer: false,
          videojs: false,
          dplayer: false,
          flvjs: false,
          mpegts: false,
          hls: false,
          webcodec: false,
          native: true
        }
        
        // 檢測 libvlc
        if (typeof window.VLC !== 'undefined' || typeof window.vlc !== 'undefined') {
          window.playerCapabilities.libvlc = true
          console.log('✅ libvlc.js 可用')
        }
        
        // 檢測 EasyPlayer Pro
        if (typeof window.EasyPlayerPro === 'function') {
          window.playerCapabilities.easyplayer = true
          console.log('✅ EasyPlayer Pro 可用')
        } else {
          console.warn('❌ EasyPlayer Pro 不可用，類型:', typeof window.EasyPlayerPro)
        }
      
              // 檢測 Video.js
        if (typeof window.videojs !== 'undefined') {
          window.playerCapabilities.videojs = true
          console.log('✅ Video.js 可用')
        }
        
        // 檢測 DPlayer
        if (typeof window.DPlayer !== 'undefined') {
          window.playerCapabilities.dplayer = true
          console.log('✅ DPlayer 可用')
        }
        
        // 檢測 FLV.js
        if (typeof window.flvjs !== 'undefined') {
          window.playerCapabilities.flvjs = true
          console.log('✅ FLV.js 可用')
        }
        
        // 檢測 mpegts.js
        if (typeof window.mpegts !== 'undefined') {
          window.playerCapabilities.mpegts = true
          console.log('✅ mpegts.js 可用')
        }
        
        // 檢測 HLS.js
        if (typeof window.Hls !== 'undefined') {
          window.playerCapabilities.hls = true
          console.log('✅ HLS.js 可用')
        }
        
        // 檢測 WebCodec
        if ('VideoDecoder' in window && 'VideoEncoder' in window) {
          window.playerCapabilities.webcodec = true
          console.log('✅ WebCodec API 可用')
        }
        
        console.log('🎬 播放器能力檢測完成:', window.playerCapabilities)
      }, 500) // 延遲 500ms 確保所有腳本載入完成
    </script>
    
    
    <!-- 錯誤處理腳本 -->
    <script>
      window.addEventListener('error', function(e) {
        console.error('Global error:', e.error);
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-message';
        errorDiv.textContent = '載入錯誤: ' + (e.error?.message || e.message);
        document.body.appendChild(errorDiv);
        setTimeout(() => errorDiv.remove(), 5000);
      });
      
      window.addEventListener('unhandledrejection', function(e) {
        console.error('Unhandled promise rejection:', e.reason);
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-message';
        errorDiv.textContent = 'Promise 錯誤: ' + (e.reason?.message || e.reason);
        document.body.appendChild(errorDiv);
        setTimeout(() => errorDiv.remove(), 5000);
      });
    </script>
